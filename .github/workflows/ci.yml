name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff + markdown)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt
      - name: Ruff lint
        run: ruff check scripts/ tests/
      - name: Ruff format check
        run: ruff format --check scripts/ tests/
      - name: Markdown lint
        run: pymarkdown --config .pymarkdown.json scan .

  test:
    name: Tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt
      - name: Syntax smoke test
        run: python -c "import ast, glob; [ast.parse(open(f).read()) for f in glob.glob('scripts/*.py')]"
      - name: Run unit tests
        run: pytest -q

  pdf-render:
    name: PDF render (end-to-end)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install WeasyPrint system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf2.0-0 \
            libffi-dev shared-mime-info
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Render skeleton CV (must be ATS-clean)
        run: |
          out=$(python3 scripts/generate_cv.py cv/master.md 2>&1)
          echo "$out"
          if echo "$out" | grep -q "ATS WARNINGS"; then
            echo "::error::Skeleton CV produced ATS warnings — fix cv/master.md"
            exit 1
          fi
          test -s cv/master.pdf
      - name: Upload rendered PDF
        uses: actions/upload-artifact@v7
        with:
          name: skeleton-cv
          path: cv/master.pdf
